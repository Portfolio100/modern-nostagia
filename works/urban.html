<!DOCTYPE html>

<body>

  <div id="header-placeholder"></div>

  <!-- Hero -->
  <section class="works-hero-section">
    <div class="container">
      <a href="/" class="back-link fade-up">
        <i class="fa-solid fa-arrow-left"></i> 返回首页
      </a>
      <p class="section-eyebrow fade-up">Works / Urban Public</p>
      <h1 class="section-title fade-up" style="font-style:italic;">城市公共</h1>
      <div class="divider fade-up"></div>

        探索城市空间中公共性与私密性的边界，
        以设计语言重构人与城市的对话关系。
        从废弃仓库的更新激活到公共艺术装置的光影诗学，

  <section class="works-grid-section">

      <div class="grid-2">

        <a href="/projects/urban-project-1.html" class="polaroid-card fade-up" aria-label="城市共生广场">

            <span>图片占位</span>
          </div>
          <span class="card-caption">城市光廊</span>

      </div>
    </div>
